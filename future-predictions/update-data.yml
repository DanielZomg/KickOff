name: Mise à jour des matchs

on:
  schedule:
    # Toutes les 3 heures (UTC). Suffisant pour des pronostics à la journée.
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Récupérer les matchs
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/fetch-data.js

      - name: Committer si changement
        run: |
          if [ -n "$(git status --porcelain data/fixtures.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/fixtures.json
            git commit -m "Mise à jour automatique des matchs"
            git push
          else
            echo "Aucun changement."
          fi
